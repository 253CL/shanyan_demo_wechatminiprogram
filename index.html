<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.bootcss.com/vConsole/3.3.4/vconsole.min.js"></script>
        <!-- 移动sdk -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
        <script type="text/javascript" src=" https://www.cmpassport.com/h5/js/jssdk_auth/jssdk-1.0.0.min.js "></script>
        <!-- 联通 -->
        <script src="js/fingerprint2.min.1.5.1.js"></script>
        <script src="js/jquery.js"></script>
        <script src="js/ispAuthPrefetch.js"></script>
        <!-- 电信 -->
        <meta content="always" name="referrer">
        <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: http: data:">
        <script src="http://static.e.189.cn/open/login/js/wap/js-sdk/EAccountSDK-fjs-1.5.2.min.js"></script>
        <meta content="always" name="referrer" />
        <title>闪验h5</title>
        <script>
            new VConsole();
        </script>
        <link rel="stylesheet" type="text/css" href="https://www.cmpassport.com/h5/js/jssdk_auth/css/ydrz-layer.css" />
    </head>
    <body>
        <div class="example">
            <h3 onclick="beginHandle(1)">初始化</h3>
            <h3 onclick="beginHandle(2)">启动授权登录</h3>
        </div>
        <span>返回的结果</span>
        <span id="res"></span>
        <script src="js/living.min.js?t=10000"></script>
        <script>
            // const config={ appKey: 'hYmhmHWV', appId: '5FO1pbba' }
            const config={ appKey: '6A0wTC39', appId: 'aenwwytB' }
            function beginHandle(type) {
                if (type === 1) {
                    window.clshanyansdk.Init(config)
                } else {
                    window.clshanyansdk.start(config, function (data) {
                        console.log(data,"抛出的错误");
                        document.getElementById('res').innerText = JSON.stringify(data);
                    });
                }
            }
        </script>
        
    </body>
</html>
