<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.bootcss.com/vConsole/3.3.4/vconsole.min.js"></script>
        <!-- 移动sdk -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
        <script type="text/javascript" src=" https://www.cmpassport.com/h5/js/jssdk_auth/jssdk-1.0.0.min.js "></script>
        <!-- 联通 -->
        <script src="js/fingerprint2.min.1.5.1.js"></script>
        <script src="js/jquery.js"></script>
        <script src="js/ispAuthPrefetch.js"></script>
        <!-- 电信 -->
        <meta content="always" name="referrer" />
        <script src="https://static.e.189.cn/open/login/js/wap/js-sdk/EAccountSDK-fjs-1.5.0.min.js"></script>
        <meta content="always" name="referrer" />
        <title>闪验h5</title>
        <script>
            new VConsole();
        </script>
        <link rel="stylesheet" type="text/css" href="https://www.cmpassport.com/h5/js/jssdk_auth/css/ydrz-layer.css" />
    </head>
    <body>
        <label for="input1">appkey:</label> <input type="text" id="input1" value="mt7vh6Hk" /><br />
        <label for="input2">appId:</label>
        <input type="text" id="input2" value="mYldGd5a" /><br />
        <div class="example">
            <button onclick="beginHandle(1)">初始化</button>
            <button id="j-get-code">启动授权登录</button>
            <!-- <button onclick="beginHandle(3)" >自定义配置</button></button> -->
        </div>
        <span style="word-wrap: break-word; word-break: break-all;">返回的结果</span>
        <span id="res"></span>
        <script src="js/umd/living.min.js?t=10000"></script>
        <script>
            function beginHandle(type) {
                var appKey = document.getElementById('input1').value;
                var appId = document.getElementById('input2').value;
                const config = { appKey, appId };
                if (type === 1) {
                    window.clshanyansdk.Init(config, function (data) {
                        document.getElementById('res').innerText = JSON.stringify(data);
                    });
                } else if (type === 2) {
                    window.clshanyansdk.start(config, function (data) {
                        document.getElementById('res').innerText = JSON.stringify(data);
                    });
                } else if (type === 3) {
                    window.clshanyansdk.setUIConfig({ setLoginTitle: '创蓝云智', setLoginLogo: 'https://www.cmpassport.com/h5/js/jssdk_auth/image/logo.png', setPrivacyOne: ['百度', 'http://www.baidu.com'], setPrivacyTwo: ['百度2', 'http://www.baidu.com'] });
                }
            }
            // 需要这样监听 直接在按钮加点击事件电信初始化以后会被电信的sdk所吞掉事件
            const button = document.getElementById('j-get-code');
            button.addEventListener('click', function () {
                beginHandle(2);
            });
        </script>
    </body>
</html>
