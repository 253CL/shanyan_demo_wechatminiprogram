---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  labels:
    name: shanyan-h5-web
    tier: provider
  name: shanyan-h5-web
  namespace: shanyan-dev
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      name: shanyan-h5-web
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: shanyan-h5-web
        name: shanyan-h5-web
    spec:
      containers:
        - image: 'hub.cm253.com/shanyan-dev/shanyan-h5-web:1.0.0'
          imagePullPolicy: IfNotPresent
          name: shanyan-h5-web
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 200m
              memory: 256Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /data/logs
              name: logs-volume
            - mountPath: /etc/nginx/conf.d/h5.conf
              name: configmap-volume
              subPath: h5.conf
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: clops
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
        - emptyDir: {}
          name: logs-volume
        - configMap:
            defaultMode: 420
            name: shanyan-h5-web
          name: configmap-volume

